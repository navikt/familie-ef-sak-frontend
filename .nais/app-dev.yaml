apiVersion: 'nais.io/v1alpha1'
kind: 'Application'
metadata:
  name: familie-ef-sak-frontend
  namespace: teamfamilie
  labels:
    team: teamfamilie
spec:
  image: {{image}}
  replicas:
    min: 2
    max: 2
  port: 8000
  liveness:
    path: /isAlive
    initialDelay: 5
  readiness:
    path: /isReady
    initialDelay: 5
  prometheus:
    enabled: true
    path: /metrics
  ingresses:
    - https://ensligmorellerfar.intern.dev.nav.no
    - https://ensligmorellerfar.ansatt.dev.nav.no
  azure:
    application:
      enabled: true
      claims:
        groups:
          - id: '01166863-22f1-4e16-9785-d7a05a22df74' # 0000-GA-Enslig-Forsorger-Beslutter
          - id: 'ee5e0b5e-454c-4612-b931-1fe363df7c2c' # 0000-GA-Enslig-Forsorger-Saksbehandler
          - id: '19dcbfde-4cdb-4c64-a1ea-ac9802b03339' # 0000-GA-Enslig-Forsorger-Veileder
          - id: 'dbe4ad45-320b-4e9a-aaa1-73cca4ee124d' # 0000-GA-Egne_ansatte
          - id: 'a1b518e2-3947-478d-8929-e5d685c47cac' # 0000-GA-Strengt_Fortrolig_Adresse
          - id: '2e1dc582-f762-4510-a660-88bf68fb7128' # 0000-GA-Fortrolig_Adresse
    sidecar:
      enabled: true
      autoLogin: true
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
      cpu: 50m
  accessPolicy:
    outbound:
      rules:
        - application: familie-ef-sak
        - application: familie-brev
      external:
        - host: familie-ef-sak.dev-fss-pub.nais.io
  envFrom:
    - secret: familie # Henter ut EF_SAK_SCOPE
    - secret: familie-ef-sak-frontend # Ulike secrets
  env:
    - name: APP_VERSION
      value: '{{version}}'
    - name: ENV
      value: preprod
  valkey:
    - instance: lookup
      access: read
  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
    logging:
      destinations:
        - id: loki
        - id: elastic
